<!DOCTYPE html>
<html>
<head>
    <title>DEATHWATCH</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 600px; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Координати центрів областей (приклад)
        const coords = {
            "Київська": [50.45, 30.52],
            "Харківська": [49.99, 36.23],
            "Миколаївська": [46.97, 31.99]
        };

        const map = L.map('map').setView([48.37, 31.16], 6); // Центр України
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Завантажуємо дані, які записав n8n
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                data.forEach(item => {
                    const pos = coords[item.location];
                    if (pos) {
                        L.marker(pos).addTo(map)
                            .bindPopup(`<b>${item.target}</b><br>Напрямок: ${item.direction}`);
                    }
                });
            });
    </script>
</body>
</html>
