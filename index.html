<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝛀DEATHWATCH𝛀</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; background: #242424; }
        .popup-content { font-family: sans-serif; font-size: 14px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
      
        var map = L.map('map').setView([48.3794, 31.1656], 6);

        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

     
        async function loadTargets() {
            try {
               
                const response = await fetch('https://raw.githubusercontent.com/deathguy505/map/refs/heads/main/index.html?token=GHSAT0AAAAAAD3QW7PEIDY7DT4527JCKYRM2POIDPA');
                const targets = await response.json();

                targets.forEach(target => {
              
                    if (target.lat && target.lng) {
                        L.marker([target.lat, target.lng])
                            .addTo(map)
                            .bindPopup(`
                                <div class="popup-content">
                                    <strong>TARGET:</strong> ${target.name || 'UNKNOWN'}<br>
                                    <strong>TYPE:</strong> ${target.type || 'DRONE/ROCKET'}<br>
                                    <strong>TIME:</strong> ${new Date().toLocaleTimeString()}
                                </div>
                            `);
                    }
                });
            } catch (error) {
                console.error("ERROR!:", error);
            }
        }

       
        loadTargets();
    </script>
</body>
</html>
