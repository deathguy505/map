<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deathwatch Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100vw; background: #0f172a; }
        
        .leaflet-popup-content-wrapper {
            background: #1e293b;
            color: #f1f5f9;
            border-radius: 8px;
            border: 1px solid #ef4444;
        }
        .leaflet-popup-tip { background: #1e293b; }
        
      
        .threat-icon {
            background: #ef4444;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
  
const coords = {
    "Вінницька": [49.23, 28.46], "Волинська": [51.21, 24.64],
    "Дніпропетровська": [48.46, 35.04], "Донецька": [48.01, 37.80],
    "Житомирська": [50.25, 28.66], "Закарпатська": [48.62, 22.28],
    "Запорізька": [47.83, 35.13], "Івано-Франківська": [48.92, 24.71],
    "Київська": [50.45, 30.52], "Кіровоградська": [48.51, 32.26],
    "Крим": [44.94, 34.10], "Луганська": [48.57, 39.33],
    "Львівська": [49.83, 24.02], "Миколаївська": [46.97, 31.99],
    "Одеська": [46.48, 30.72], "Полтавська": [49.58, 34.55],
    "Рівненська": [50.61, 26.25], "Сумська": [50.90, 34.79],
    "Тернопільська": [49.55, 25.59], "Харківська": [49.99, 36.23],
    "Херсонська": [46.63, 32.61], "Хмельницька": [49.42, 26.98],
    "Черкаська": [49.44, 32.05], "Чернівецька": [48.29, 25.93],
    "Чернігівська": [51.49, 31.28], "Київ": [50.45, 30.52],
    "Севастополь": [44.61, 33.52]
};


const map = L.map('map', {
    zoomControl: false 
}).setView([48.37, 31.16], 6);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);


function addThreat(threat) {
    const position = coords[threat.location];
    if (position) {
   
        const pulse = L.circleMarker(position, {
            radius: 10,
            fillColor: "#ff0000",
            color: "#ff0000",
            weight: 2,
            opacity: 0.5,
            fillOpacity: 0.4,
            className: 'pulse-animation' 
        }).addTo(map);

       
        const marker = L.circleMarker(position, {
            radius: 5,
            fillColor: "#ffffff",
            color: "#ff0000",
            weight: 2,
            opacity: 1,
            fillOpacity: 1
        }).addTo(map);

        marker.bindPopup(`
            <div style="text-align:center;">
                <b style="color:red; font-size:14px;">${threat.target}</b><br>
                <span style="color:#ccc;">Напрямок: ${threat.direction}</span>
            </div>
        `);
    }
}


fetch('https://deathguy365.github.io/map/data.json')
    .then(res => res.json())
    .then(data => {
        data.forEach(threat => addThreat(threat));
    })
    .catch(err => console.error("Не вдалося завантажити цілі:", err));
    </script>
</body>
</html>
