<!DOCTYPE html>
<html>
<head>
    <title>DEATHWATCH</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 600px; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Координати центрів областей (приклад)
        const coords = {
            {
  "Вінницька": [49.23, 28.46],
  "Волинська": [51.21, 24.64],
  "Дніпропетровська": [48.46, 35.04],
  "Донецька": [48.01, 37.80],
  "Житомирська": [50.25, 28.66],
  "Закарпатська": [48.62, 22.28],
  "Запорізька": [47.83, 35.13],
  "Івано-Франківська": [48.92, 24.71],
  "Київська": [50.45, 30.52],
  "Кіровоградська": [48.51, 32.26],
  "Крим": [44.94, 34.10],
  "Луганська": [48.57, 39.33],
  "Львівська": [49.83, 24.02],
  "Миколаївська": [46.97, 31.99],
  "Одеська": [46.48, 30.72],
  "Полтавська": [49.58, 34.55],
  "Рівненська": [50.61, 26.25],
  "Сумська": [50.90, 34.79],
  "Тернопільська": [49.55, 25.59],
  "Харківська": [49.99, 36.23],
  "Херсонська": [46.63, 32.61],
  "Хмельницька": [49.42, 26.98],
  "Черкаська": [49.44, 32.05],
  "Чернівецька": [48.29, 25.93],
  "Чернігівська": [51.49, 31.28],
  "Київ": [50.45, 30.52],
  "Севастополь": [44.61, 33.52]
}
        };

        const map = L.map('map').setView([48.37, 31.16], 6); // Центр України
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Завантажуємо дані, які записав n8n
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                data.forEach(item => {
                    const pos = coords[item.location];
                    if (pos) {
                        L.marker(pos).addTo(map)
                            .bindPopup(`<b>${item.target}</b><br>Напрямок: ${item.direction}`);
                    }
                });
            });
    </script>
</body>
</html>
